<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Демопротокол</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--bg-card:#fff;--bg-hover:#efefea;--bg-input:#fafaf8;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);--border-focus:rgba(99,102,241,0.5);
  --text:#1a1a1e;--text-2:#5a5a68;--text-3:#9898a6;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.08);--accent-hover:#4f52d4;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --orange:#ea580c;--orange-bg:rgba(234,88,12,0.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
  --sky:#0284c7;--sky-bg:rgba(2,132,199,0.08);
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --tr:150ms ease;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --sh-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --sh-lg:0 8px 24px rgba(0,0,0,0.1),0 4px 8px rgba(0,0,0,0.06);
}
.dark{
  --bg:#0f0f11;--bg-card:#17171a;--bg-hover:#1e1e22;--bg-input:#1a1a1e;
  --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);--border-focus:rgba(99,102,241,0.6);
  --text:#f0f0f2;--text-2:#9898a6;--text-3:#5c5c6e;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.12);--accent-hover:#818cf8;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,0.1);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);
  --sky:#38bdf8;--sky-bg:rgba(56,189,248,0.1);
  --sh:0 1px 3px rgba(0,0,0,0.3);--sh-md:0 4px 24px rgba(0,0,0,0.4);--sh-lg:0 8px 32px rgba(0,0,0,0.5);
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
input,textarea,select{font-family:var(--font);font-size:13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:0 10px;height:34px;outline:none;transition:border-color var(--tr);width:100%}
input::placeholder,textarea::placeholder{color:var(--text-3)}
input:focus,textarea:focus,select:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(99,102,241,0.06)}
select option{background:var(--bg-card)}
textarea{height:auto;padding:8px 10px;resize:vertical;line-height:1.5;min-height:60px}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;transition:all var(--tr)}
button:focus-visible{box-shadow:0 0 0 2px var(--accent)}
/* layout */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.topbar{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px;box-shadow:var(--sh)}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.logo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.demo-badge{display:flex;align-items:center;gap:8px;background:var(--accent-bg);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:3px 12px 3px 8px;max-width:340px;overflow:hidden}
.demo-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.demo-badge-text{font-size:12px;font-weight:500;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:var(--radius);font-size:13px;font-weight:500;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-md)}
.btn-accent{background:var(--accent);color:#fff;border:1px solid transparent;box-shadow:var(--sh)}
.btn-accent:hover{background:var(--accent-hover)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid transparent}
.btn-danger:hover{background:rgba(220,38,38,0.16)}
.btn-warn{background:var(--amber-bg);color:var(--amber);border:1px solid transparent}
.btn-warn:hover{background:rgba(217,119,6,0.16)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid transparent}
.btn-green:hover{background:rgba(22,163,74,0.16)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-xs{height:24px;padding:0 8px;font-size:11px}
.btn-icon{width:32px;padding:0;justify-content:center}
/* body layout */
.body{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:768px){.body{grid-template-columns:1fr}.sidebar{display:none}}
.sidebar{border-right:1px solid var(--border);background:var(--bg);padding:14px 10px;display:flex;flex-direction:column;gap:2px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:10px 10px 5px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius);font-size:13px;color:var(--text-2);cursor:pointer;background:none;border:none;width:100%;text-align:left;transition:all var(--tr)}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-left{display:flex;align-items:center;gap:7px;min-width:0}
.nav-left span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cnt{font-size:11px;background:var(--bg-hover);color:var(--text-3);padding:1px 6px;border-radius:10px;font-weight:500;flex-shrink:0}
.nav-item.active .cnt{background:rgba(99,102,241,0.15);color:var(--accent)}
/* main */
.main{padding:24px;min-width:0}
/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;box-shadow:var(--sh)}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-0.5px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
/* form */
.add-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh)}
.form-title{font-size:13px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:7px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:var(--text-3);letter-spacing:.03em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;align-items:center}
/* cards */
.items-list{display:flex;flex-direction:column;gap:8px}
.item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;transition:border-color var(--tr),box-shadow var(--tr);position:relative;overflow:hidden;box-shadow:var(--sh)}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px}
.item-card.s-pending::before{background:var(--amber)}
.item-card.s-created::before{background:var(--sky)}
.item-card.s-inprogress::before{background:var(--accent)}
.item-card.s-done::before{background:var(--green)}
.item-card.s-declined::before{background:var(--red)}
.item-card:hover{border-color:var(--border-md);box-shadow:var(--sh-md)}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-num{font-size:11px;font-family:var(--mono);color:var(--text-3);min-width:24px;padding-top:2px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;color:var(--text);line-height:1.45;margin-bottom:7px;white-space:pre-wrap;word-break:break-word}
.item-comment{font-size:12px;color:var(--text-2);background:var(--bg-hover);border-radius:var(--radius);padding:7px 10px;margin-bottom:7px;line-height:1.5;white-space:pre-wrap;word-break:break-word;border-left:2px solid var(--border-md)}
.pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.p-amber{background:var(--amber-bg);color:var(--amber)}
.p-sky{background:var(--sky-bg);color:var(--sky)}
.p-accent{background:var(--accent-bg);color:var(--accent)}
.p-green{background:var(--green-bg);color:var(--green)}
.p-red{background:var(--red-bg);color:var(--red)}
.p-orange{background:var(--orange-bg);color:var(--orange)}
.p-purple{background:var(--purple-bg);color:var(--purple)}
.p-gray{background:rgba(0,0,0,0.05);color:var(--text-3)}
.dark .p-gray{background:rgba(255,255,255,0.07)}
.item-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mchip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-3)}
.ilink{font-size:11px;color:var(--accent);text-decoration:none}
.ilink:hover{color:var(--accent-hover);text-decoration:underline}
.item-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity var(--tr)}
.item-card:hover .item-actions{opacity:1}
/* edit panel */
.edit-panel{margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.ep-grid{display:grid;gap:8px;margin-bottom:8px}
.ep-3{grid-template-columns:1fr 1fr 1fr}
.ep-2{grid-template-columns:1fr auto}
@media(max-width:600px){.ep-3{grid-template-columns:1fr 1fr}}
.ep-grid select,.ep-grid input,.ep-grid textarea{height:30px;font-size:12px}
.ep-grid textarea{height:56px}
/* confirm */
.confirm-box{background:var(--red-bg);border:1px solid rgba(220,38,38,0.2);border-radius:var(--radius);padding:10px 12px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.confirm-box span{font-size:12px;color:var(--red)}
.confirm-btns{display:flex;gap:6px;flex-shrink:0}
/* feature group */
.feat-group{margin-bottom:22px}
.feat-group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.feat-group-title{font-size:13px;font-weight:600;color:var(--text)}
.feat-group-cnt{font-size:11px;color:var(--text-3);background:var(--bg-hover);padding:2px 8px;border-radius:10px}
/* history */
.demo-history-list{display:flex;flex-direction:column;gap:10px}
.demo-hist-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--sh);transition:box-shadow var(--tr)}
.demo-hist-card:hover{box-shadow:var(--sh-md)}
.demo-hist-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:12px}
.demo-hist-info{flex:1;min-width:0}
.demo-hist-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.demo-hist-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.demo-hist-body{border-top:1px solid var(--border);padding:14px 16px}
.demo-hist-actions{display:flex;gap:6px;margin-bottom:14px}
/* empty / loading */
.empty{text-align:center;padding:48px 24px;color:var(--text-3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.35}
.empty-title{font-size:15px;color:var(--text-2);margin-bottom:6px;font-weight:500}
.empty-sub{font-size:13px;margin-bottom:20px}
.loading-wrap{display:flex;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--text-3);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spin-sm{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
/* new demo screen */
.new-demo-screen{max-width:520px;margin:0 auto;padding-top:40px}
.new-demo-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px;box-shadow:var(--sh-md)}
.new-demo-title{font-size:18px;font-weight:600;margin-bottom:6px}
.new-demo-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;line-height:1.6}
.new-demo-field{margin-bottom:12px}
.new-demo-field label{display:block;font-size:12px;color:var(--text-3);margin-bottom:4px}
.history-link{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:20px;font-size:13px;color:var(--text-3);cursor:pointer;padding:10px;border-radius:var(--radius);transition:all var(--tr)}
.history-link:hover{background:var(--bg-hover);color:var(--text-2)}
/* export */
.export-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--sh)}
.export-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg)}
.export-pre{padding:14px;font-family:var(--mono);font-size:12px;color:var(--text-2);white-space:pre-wrap;line-height:1.7;max-height:480px;overflow-y:auto}
/* filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{height:30px;font-size:12px;width:auto;flex:1;min-width:100px}
/* toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:9px 14px;font-size:13px;color:var(--text);box-shadow:var(--sh-md);z-index:999;animation:slideUp .18s ease;display:flex;align-items:center;gap:7px}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:26px 30px;width:100%;max-width:500px;box-shadow:var(--sh-lg);position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-3);cursor:pointer;font-size:17px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
.help-sec{margin-bottom:14px}
.help-sec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:7px}
.help-row{display:flex;gap:8px;margin-bottom:5px;font-size:13px;color:var(--text-2);line-height:1.5}
/* setup */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px 36px;width:100%;max-width:480px;box-shadow:var(--sh-md)}
.setup-logo{font-size:17px;font-weight:600;margin-bottom:7px}
.setup-logo span{color:var(--accent)}
.setup-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;line-height:1.7}
.setup-field{margin-bottom:12px}
.setup-field label{display:block;font-size:12px;color:var(--text-3);margin-bottom:4px}
.setup-hint{font-size:12px;color:var(--text-3);margin-top:18px;line-height:1.8;padding:12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
.setup-hint a{color:var(--accent);text-decoration:none}
.setup-hint code{font-family:var(--mono);font-size:11px;background:var(--accent-bg);color:var(--accent);padding:1px 4px;border-radius:3px}
.setup-err{background:var(--red-bg);border:1px solid rgba(220,38,38,0.2);border-radius:var(--radius);padding:9px 11px;font-size:12px;color:var(--red);margin-bottom:12px}
.setup-step{display:flex;gap:9px;margin-bottom:7px;font-size:12px;color:var(--text-2)}
.setup-step-n{width:17px;height:17px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.divider{height:1px;background:var(--border);margin:18px 0}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);font-weight:600;margin-bottom:9px}
.kbd{font-family:var(--mono);font-size:10px;background:var(--bg-hover);color:var(--text-3);padding:2px 5px;border-radius:4px;border:1px solid var(--border-md)}
.theme-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:14px}
.theme-btn:hover{background:var(--bg-hover);color:var(--text)}
.finish-bar{background:var(--amber-bg);border:1px solid rgba(217,119,6,0.2);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.finish-bar-text{font-size:13px;color:var(--amber);font-weight:500}
.finish-bar-sub{font-size:12px;color:var(--text-3);margin-top:2px}
</style>
</head>

function SetupScreen({onConnect}) {
  const [url,setUrl]=useState('');
  const [key,setKey]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  async function connect() {
    if(!url.trim()||!key.trim()){setErr('Заполните оба поля');return;}
    setBusy(true);setErr('');
    try {
      const c=createClient(url.trim(),key.trim());
      const {error}=await c.from('demos').select('id').limit(1);
      if(error&&error.code!=='PGRST116')throw error;
      localStorage.setItem(SK,JSON.stringify({url:url.trim(),key:key.trim()}));
      onConnect(c);
    } catch(e){setErr('Ошибка: '+(e.message||'проверьте URL и ключ'));setBusy(false);}
  }
  return (
    <div className="setup">
      <div className="setup-card">
        <div className="setup-logo">Демо<span>протокол</span></div>
        <div className="setup-sub">Подключите Supabase — бесплатную облачную базу данных.</div>
        {err&&<div className="setup-err">{err}</div>}
        <div className="setup-field"><label>Project URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/>
        </div>
        <div className="setup-field"><label>Anon Public Key</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGc..." type="password"/>
        </div>
        <button className="btn btn-accent" style={{width:'100%',height:38,marginTop:4,fontSize:14}} onClick={connect} disabled={busy}>
          {busy?<><span className="spin-sm"/> Подключение...</>:'Подключить'}
        </button>
        <div className="divider"/>
        <div className="setup-hint">
          {[['1','Зарегистрируйтесь на ',<a href="https://supabase.com" target="_blank">supabase.com</a>],
            ['2','Создайте проект'],
            ['3','Settings → API Keys → Legacy'],
            ['4','Скопируйте ',<code>Project URL</code>,' и ',<code>anon public</code>],
            ['5','В ',<code>SQL Editor</code>,' выполните SQL из инструкции'],
          ].map(([n,...r])=>(
            <div key={n} className="setup-step"><span className="setup-step-n">{n}</span><span>{r}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────
function App() {
  const [sb,setSb]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('live'); // live | all | history | export-demo
  const [toast,setToast]=useState('');
  const [showHelp,setShowHelp]=useState(false);
  const [dark,setDark]=useState(()=>localStorage.getItem(TK)==='dark');

  // demos
  const [demos,setDemos]=useState([]); // [{id,name,date,author,finished,created_at}]
  const [activeDemoId,setActiveDemoId]=useState(null);
  const [items,setItems]=useState([]); // all items for active demo
  const [allItems,setAllItems]=useState([]); // all items across all demos for "all tasks" view

  // new demo form
  const [newName,setNewName]=useState('');
  const [newDate,setNewDate]=useState(new Date().toISOString().slice(0,10));
  const [newAuthor,setNewAuthor]=useState('');

  // add item form
  const [fDesc,setFDesc]=useState('');
  const [fAuthor,setFAuthor]=useState('');
  const [fPriority,setFPriority]=useState('medium');
  const [fLink,setFLink]=useState('');
  const [fRel,setFRel]=useState('');
  const [fComment,setFComment]=useState('');
  const [fAssignee,setFAssignee]=useState('');

  // ui state
  const [expandedId,setExpandedId]=useState(null);
  const [confirmId,setConfirmId]=useState(null);
  const [expandedDemoId,setExpandedDemoId]=useState(null);
  const [fStatus,setFStatus]=useState('');
  const [fSearch,setFSearch]=useState('');
  const [fFeature,setFFeature]=useState('');
  const [exportDemoId,setExportDemoId]=useState(null);
  const [showFinishConfirm,setShowFinishConfirm]=useState(false);

  // theme
  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
    localStorage.setItem(TK,dark?'dark':'light');
  },[dark]);

  // init supabase
  useEffect(()=>{
    if(SUPABASE_URL&&SUPABASE_URL!=='ВСТАВЬТЕ_URL_СЮДА'){setSb(createClient(SUPABASE_URL,SUPABASE_KEY));return;}
    try{const s=localStorage.getItem(SK);if(s){const{url,key}=JSON.parse(s);setSb(createClient(url,key));return;}}catch{}
    setLoading(false);
  },[]);

  // load data
  const loadAll=useCallback(async(client)=>{
    const c=client||sb;
    const [{data:dems},{data:itms}]=await Promise.all([
      c.from('demos').select('*').order('created_at',{ascending:false}),
      c.from('demo_items').select('*').order('item_order',{ascending:true}),
    ]);
    if(dems)setDemos(dems);
    if(itms)setAllItems(itms);
    const active=dems?.find(d=>!d.finished);
    if(active){
      setActiveDemoId(active.id);
      setItems(itms?.filter(i=>i.demo_id===active.id)||[]);
    } else {
      setActiveDemoId(null);
      setItems([]);
    }
    setLoading(false);
  },[sb]);

  useEffect(()=>{if(sb)loadAll(sb);},[sb]);

  const activeDemo=demos.find(d=>d.id===activeDemoId);

  // create new demo
  async function createDemo(){
    if(!newName.trim())return;
    const {data,error}=await sb.from('demos').insert([{
      name:newName.trim(),date:newDate,author:newAuthor.trim(),finished:false
    }]).select();
    if(!error&&data){
      setDemos(prev=>[data[0],...prev]);
      setActiveDemoId(data[0].id);
      setItems([]);
      setNewName('');setNewDate(new Date().toISOString().slice(0,10));setNewAuthor('');
      setView('live');
      setToast('Демо начато!');
    }
  }

  // finish demo
  async function finishDemo(){
    if(!activeDemoId)return;
    await sb.from('demos').update({finished:true}).eq('id',activeDemoId);
    setDemos(prev=>prev.map(d=>d.id===activeDemoId?{...d,finished:true}:d));
    setActiveDemoId(null);
    setItems([]);
    setShowFinishConfirm(false);
    setView('history');
    setToast('Демо завершено и перемещено в историю');
  }

  // add item
  async function addItem(){
    if(!fDesc.trim()||!activeDemoId)return;
    const link=fLink.trim();
    const status=link?'created':'pending';
    const order=items.length+1;
    const row={
      demo_id:activeDemoId,
      description:fDesc.trim(),author:fAuthor.trim()||'Не указан',
      priority:fPriority,status,link,release:fRel.trim(),
      comment:fComment.trim(),assignee:fAssignee.trim(),
      item_order:order,
    };
    const {data,error}=await sb.from('demo_items').insert([row]).select();
    if(!error&&data){
      setItems(prev=>[...prev,data[0]]);
      setAllItems(prev=>[...prev,data[0]]);
      setFDesc('');setFLink('');setFRel('');setFComment('');setFAssignee('');
      setToast('Зафиксировано');
    }
  }

  // update item
  async function updateItem(id,patch){
    if('link' in patch){
      const item=allItems.find(i=>i.id===id);
      if(item){const ns=autoStatus(item.status,patch.link);if(ns!==item.status)patch.status=ns;}
    }
    await sb.from('demo_items').update(patch).eq('id',id);
    setItems(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
    setAllItems(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  }

  // delete item
  async function deleteItem(id){
    await sb.from('demo_items').delete().eq('id',id);
    setItems(prev=>prev.filter(i=>i.id!==id));
    setAllItems(prev=>prev.filter(i=>i.id!==id));
    setExpandedId(null);setConfirmId(null);
    setToast('Удалено');
  }

  async function refresh(){setLoading(true);await loadAll(sb);setToast('Обновлено');}
  function disconnect(){localStorage.removeItem(SK);window.location.reload();}

  if(!sb&&!loading)return <SetupScreen onConnect={c=>{setSb(c);setLoading(true);}}/>;

  // counts for active demo
  const counts={all:items.length,pending:0,created:0,inprogress:0,done:0,declined:0};
  items.forEach(i=>{if(counts[i.status]!==undefined)counts[i.status]++;});

  // all tasks view
  const visibleAll=allItems.filter(i=>{
    if(fFeature&&i.demo_id!==Number(fFeature))return false;
    if(fStatus&&i.status!==fStatus)return false;
    if(fSearch&&!i.description.toLowerCase().includes(fSearch.toLowerCase())
      &&!(i.comment||'').toLowerCase().includes(fSearch.toLowerCase())
      &&!i.author.toLowerCase().includes(fSearch.toLowerCase()))return false;
    return true;
  });
  const groupedAll=()=>{
    const map={};
    visibleAll.forEach(i=>{
      const demo=demos.find(d=>d.id===i.demo_id);
      const k=i.demo_id;
      if(!map[k])map[k]={demo,items:[]};
      map[k].items.push(i);
    });
    // sort by demo created_at desc
    return Object.values(map).sort((a,b)=>new Date(b.demo?.created_at||0)-new Date(a.demo?.created_at||0));
  };

  // export
  function buildExport(demoId){
    const demo=demos.find(d=>d.id===demoId);
    const its=allItems.filter(i=>i.demo_id===demoId);
    const line='─'.repeat(44);
    let t=`ПРОТОКОЛ ДЕМО\n${line}\n`;
    t+=`Фича:    ${demo?.name||'—'}\nДата:    ${demo?.date||'—'}\nВедущий: ${demo?.author||'—'}\n${line}\n\n`;
    const groups={};
    Object.keys(SM).forEach(k=>groups[k]=[]);
    its.forEach(i=>groups[i.status]?.push(i));
    ['inprogress','created','pending','done','declined'].forEach(s=>{
      if(!groups[s].length)return;
      t+=`${SM[s].label.toUpperCase()} (${groups[s].length})\n`;
      groups[s].forEach((i,idx)=>{
        t+=`  ${idx+1}. [${PM[i.priority]?.label||i.priority}] ${i.description}\n`;
        t+=`       Автор: ${i.author}`;
        if(i.assignee)t+=`  |  Ответственный: ${i.assignee}`;
        if(i.release)t+=`  |  Релиз: ${i.release}`;
        if(i.link)t+=`  |  Задача: ${i.link}`;
        t+='\n';
        if(i.comment)t+=`       Комментарий: ${i.comment}\n`;
      });
      t+='\n';
    });
    t+=`${line}\nСформировано: ${new Date().toLocaleString('ru-RU')}`;
    return t;
  }

  function openExport(demoId){
    const demo=demos.find(d=>d.id===demoId);
    const its=allItems.filter(i=>i.demo_id===demoId);
    const statusColors={pending:'#d97706',created:'#0284c7',inprogress:'#6366f1',done:'#16a34a',declined:'#dc2626'};
    const statusBg={pending:'#fef3c7',created:'#e0f2fe',inprogress:'#eef2ff',done:'#dcfce7',declined:'#fee2e2'};
    const priorityColors={blocking:'#dc2626',critical:'#ea580c',medium:'#d97706',low:'#9898a6'};
    const priorityBg={blocking:'#fee2e2',critical:'#ffedd5',medium:'#fef3c7',low:'#f3f4f6'};

          ${item.comment?`<div style="font-size:12px;color:#5a5a68;background:#f9f9f7;border-left:2px solid #e0e0e0;padding:5px 8px;border-radius:4px;margin-top:4px;white-space:pre-wrap">${item.comment.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`:''}
        </td>
        <td style="padding:12px 8px;vertical-align:top">${badge(SM[item.status]?.label||item.status,statusColors[item.status]||'#666',statusBg[item.status]||'#f5f5f5')}</td>
        <td style="padding:12px 8px;vertical-align:top">${badge(PM[item.priority]?.label||item.priority,priorityColors[item.priority]||'#666',priorityBg[item.priority]||'#f5f5f5')}</td>
        <td style="padding:12px 8px;font-size:12px;color:#5a5a68;vertical-align:top">${item.author||'—'}</td>
        <td style="padding:12px 8px;font-size:12px;color:#5a5a68;vertical-align:top">${item.assignee||'—'}</td>
        <td style="padding:12px 8px;font-size:12px;vertical-align:top">${item.link?`<a href="${item.link}" style="color:#6366f1;text-decoration:none">${item.link.replace(/^https?:\/\//,'').slice(0,28)}</a>`:'—'}</td>
        <td style="padding:12px 8px;font-size:12px;color:#5a5a68;vertical-align:top">${item.release||'—'}</td>

    function copyText(){
      const lines=[];
      const title=document.querySelector('.demo-title');
      if(title)lines.push(title.textContent,'');
      document.querySelectorAll('tbody tr').forEach((tr,i)=>{
        const tds=[...tr.querySelectorAll('td')].map(td=>td.textContent.trim().replace(/\s+/g,' '));
        lines.push((i+1)+'. '+tds[1]);
        lines.push('   Статус: '+tds[2]+'  |  Приоритет: '+tds[3]);
        lines.push('   Автор: '+tds[4]+'  |  Ответственный: '+tds[5]);
        if(tds[6]&&tds[6]!=='—')lines.push('   Задача: '+tds[6]);
        if(tds[7]&&tds[7]!=='—')lines.push('   Релиз: '+tds[7]);
        lines.push('');
      });
      navigator.clipboard.writeText(lines.join('\n')).then(()=>{
        const btn=document.querySelector('.cp-btn');
        btn.textContent='✓ Скопировано';
        setTimeout(()=>btn.innerHTML='📋 Скопировать текст',2000);
      });
    }

                        </div>
                      </div>
                    ))
                  }
                </>
              )}

              {/* ── ИСТОРИЯ ДЕМО ── */}
              {view==='history'&&(
                <>
                  {finishedDemos.length===0
                    ?<div className="empty">
                        <div className="empty-icon">🗂️</div>
                        <div className="empty-title">История пуста</div>
                        <div className="empty-sub">Завершённые демо будут появляться здесь</div>
                        {!activeDemoId&&<button className="btn btn-accent" onClick={()=>setView('live')}>Начать новое демо</button>}
                      </div>
                    :(
                      <div className="demo-history-list">
                        {finishedDemos.map(demo=>{
                          const dItems=allItems.filter(i=>i.demo_id===demo.id);
                          const isOpen=expandedDemoId===demo.id;
                          const dc={all:dItems.length,pending:0,created:0,inprogress:0,done:0,declined:0};
                          dItems.forEach(i=>{if(dc[i.status]!==undefined)dc[i.status]++;});
                          return(
                            <div key={demo.id} className="demo-hist-card">
                              <div className="demo-hist-header" onClick={()=>setExpandedDemoId(isOpen?null:demo.id)}>
                                <div className="demo-hist-info">
                                  <div className="demo-hist-name">{demo.name}</div>
                                  <div className="demo-hist-meta">
                                    {demo.date&&<span className="mchip"><Ico d={ic.clock} s={11}/>{demo.date}</span>}
                                    {demo.author&&<span className="mchip"><Ico d={ic.user} s={11}/>{demo.author}</span>}
                                    <span className="mchip">{dItems.length} доработок</span>
                                    {dc.pending>0&&<span className="pill p-amber" style={{fontSize:10}}>Ожидает: {dc.pending}</span>}
                                    {dc.done>0&&<span className="pill p-green" style={{fontSize:10}}>Готово: {dc.done}</span>}
                                  </div>
                                </div>
                                <Ico d={isOpen?ic.chevD:ic.chevR} s={16} style={{color:'var(--text-3)',flexShrink:0}}/>
                              </div>
                              {isOpen&&(
                                <div className="demo-hist-body">
                                  <div className="demo-hist-actions">
                                    <button className="btn btn-ghost btn-sm" onClick={()=>openExport(demo.id)}>
                                      <Ico d={ic.export2} s={13}/>Экспорт протокола
                                    </button>
                                  </div>
                                  {dItems.length===0
                                    ?<div style={{textAlign:'center',padding:'20px',color:'var(--text-3)',fontSize:13}}>Нет доработок</div>
                                    :<div className="items-list">
                                      {dItems.map(i=><ItemCard key={i.id} item={i} readOnly={false}/>)}
                                    </div>
                                  }
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )
                  }
                </>
              )}
            </>
          )}
        </main>
      </div>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
