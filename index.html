<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--bg-card:#fff;--bg-hover:#efefea;--bg-input:#fafaf8;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);--border-focus:rgba(99,102,241,0.5);
  --text:#1a1a1e;--text-2:#5a5a68;--text-3:#9898a6;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.08);--accent-hover:#4f52d4;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);
  --orange:#ea580c;--orange-bg:rgba(234,88,12,0.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
  --sky:#0284c7;--sky-bg:rgba(2,132,199,0.08);
  --radius:8px;--radius-lg:12px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --tr:150ms ease;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --sh-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
}
.dark{
  --bg:#0f0f11;--bg-card:#17171a;--bg-hover:#1e1e22;--bg-input:#1a1a1e;
  --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);--border-focus:rgba(99,102,241,0.6);
  --text:#f0f0f2;--text-2:#9898a6;--text-3:#5c5c6e;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.12);--accent-hover:#818cf8;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,0.1);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);
  --sky:#38bdf8;--sky-bg:rgba(56,189,248,0.1);
  --sh:0 1px 3px rgba(0,0,0,0.3);--sh-md:0 4px 24px rgba(0,0,0,0.4);
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
input,textarea,select{font-family:var(--font);font-size:13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:0 10px;height:34px;outline:none;transition:border-color var(--tr);width:100%}
input::placeholder,textarea::placeholder{color:var(--text-3)}
input:focus,textarea:focus,select:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(99,102,241,0.06)}
select option{background:var(--bg-card)}
textarea{height:auto;padding:8px 10px;resize:vertical;line-height:1.5;min-height:68px}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;transition:all var(--tr)}
button:focus-visible{box-shadow:0 0 0 2px var(--accent)}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.topbar{border-bottom:1px solid var(--border);background:var(--bg);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px;box-shadow:var(--sh)}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.logo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.demo-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:1}
.meta-input{background:transparent;border:none;font-size:13px;color:var(--text-2);padding:0;height:auto;width:auto;min-width:80px}
.meta-input:focus{color:var(--text);box-shadow:none;border:none}
.meta-sep{color:var(--text-3);font-size:12px;flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:var(--radius);font-size:13px;font-weight:500;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-md)}
.btn-accent{background:var(--accent);color:#fff;border:1px solid transparent;box-shadow:var(--sh)}
.btn-accent:hover{background:var(--accent-hover)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid transparent}
.btn-danger:hover{background:rgba(220,38,38,0.16)}
.btn-sm{height:26px;padding:0 10px;font-size:12px}
.btn-icon{width:30px;padding:0;justify-content:center}
.body{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:768px){.body{grid-template-columns:1fr}.sidebar{display:none}}
.sidebar{border-right:1px solid var(--border);background:var(--bg);padding:16px 12px;display:flex;flex-direction:column;gap:3px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);padding:10px 10px 5px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--radius);font-size:13px;color:var(--text-2);cursor:pointer;background:none;border:none;width:100%;text-align:left;transition:all var(--tr)}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item-left{display:flex;align-items:center;gap:7px;min-width:0}
.nav-item-left span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cnt{font-size:11px;background:var(--bg-hover);color:var(--text-3);padding:1px 6px;border-radius:10px;font-weight:500;flex-shrink:0}
.nav-item.active .cnt{background:rgba(99,102,241,0.15);color:var(--accent)}
.main{padding:24px;min-width:0}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;box-shadow:var(--sh)}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-0.5px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em}
.add-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh)}
.form-title{font-size:13px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:7px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:var(--text-3);letter-spacing:0.03em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;align-items:center}
.items-list{display:flex;flex-direction:column;gap:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{height:30px;font-size:12px;width:auto;flex:1;min-width:100px}
/* feature group header */
.feat-group{margin-bottom:20px}
.feat-group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 0}
.feat-group-title{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em}
.feat-group-cnt{font-size:11px;color:var(--text-3);background:var(--bg-hover);padding:1px 7px;border-radius:10px}
/* item card */
.item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;transition:border-color var(--tr),box-shadow var(--tr);position:relative;overflow:hidden;box-shadow:var(--sh)}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px}
.item-card.s-pending::before{background:var(--amber)}
.item-card.s-created::before{background:var(--sky)}
.item-card.s-inprogress::before{background:var(--accent)}
.item-card.s-done::before{background:var(--green)}
.item-card.s-declined::before{background:var(--red)}
.item-card:hover{border-color:var(--border-md);box-shadow:var(--sh-md)}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-num{font-size:11px;font-family:var(--mono);color:var(--text-3);min-width:28px;padding-top:2px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;color:var(--text);line-height:1.45;margin-bottom:7px;white-space:pre-wrap;word-break:break-word}
.item-comment{font-size:12px;color:var(--text-2);background:var(--bg-hover);border-radius:var(--radius);padding:7px 10px;margin-bottom:7px;line-height:1.5;white-space:pre-wrap;word-break:break-word;border-left:2px solid var(--border-md)}
.pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.p-amber{background:var(--amber-bg);color:var(--amber)}
.p-sky{background:var(--sky-bg);color:var(--sky)}
.p-accent{background:var(--accent-bg);color:var(--accent)}
.p-green{background:var(--green-bg);color:var(--green)}
.p-red{background:var(--red-bg);color:var(--red)}
.p-orange{background:var(--orange-bg);color:var(--orange)}
.p-purple{background:var(--purple-bg);color:var(--purple)}
.p-gray{background:rgba(0,0,0,0.05);color:var(--text-3)}
.dark .p-gray{background:rgba(255,255,255,0.07)}
.item-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mchip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-3)}
.ilink{font-size:11px;color:var(--accent);text-decoration:none}
.ilink:hover{color:var(--accent-hover);text-decoration:underline}
.item-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity var(--tr)}
.item-card:hover .item-actions{opacity:1}
/* edit panel */
.edit-panel{margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.edit-row{display:grid;gap:8px;margin-bottom:8px}
.edit-row-3{grid-template-columns:1fr 1fr 1fr}
.edit-row-2{grid-template-columns:1fr auto}
@media(max-width:600px){.edit-row-3{grid-template-columns:1fr}}
.edit-row select,.edit-row input,.edit-row textarea{height:30px;font-size:12px}
.edit-row textarea{height:60px}
/* confirm dialog */
.confirm-box{background:var(--red-bg);border:1px solid rgba(220,38,38,0.25);border-radius:var(--radius);padding:10px 12px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.confirm-box span{font-size:12px;color:var(--red)}
.confirm-btns{display:flex;gap:6px;flex-shrink:0}
/* empty */
.empty{text-align:center;padding:40px 24px;color:var(--text-3)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
.empty-title{font-size:14px;color:var(--text-2);margin-bottom:5px}
/* export */
.export-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--sh)}
.export-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg)}
.export-bar-title{font-size:12px;color:var(--text-3);font-family:var(--mono)}
.export-pre{padding:14px;font-family:var(--mono);font-size:12px;color:var(--text-2);white-space:pre-wrap;line-height:1.7;max-height:480px;overflow-y:auto}
/* toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:9px 14px;font-size:13px;color:var(--text);box-shadow:var(--sh-md);z-index:999;animation:slideUp .18s ease;display:flex;align-items:center;gap:7px}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(2px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:26px 30px;width:100%;max-width:500px;box-shadow:var(--sh-md);position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-3);cursor:pointer;font-size:17px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
.help-sec{margin-bottom:14px}
.help-sec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:7px}
.help-row{display:flex;gap:8px;margin-bottom:5px;font-size:13px;color:var(--text-2);line-height:1.5}
/* setup */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px 36px;width:100%;max-width:480px;box-shadow:var(--sh-md)}
.setup-logo{font-size:17px;font-weight:600;margin-bottom:7px}
.setup-logo span{color:var(--accent)}
.setup-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;line-height:1.7}
.setup-field{margin-bottom:12px}
.setup-field label{display:block;font-size:12px;color:var(--text-3);margin-bottom:4px}
.setup-hint{font-size:12px;color:var(--text-3);margin-top:18px;line-height:1.8;padding:12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
.setup-hint a{color:var(--accent);text-decoration:none}
.setup-hint code{font-family:var(--mono);font-size:11px;background:var(--accent-bg);color:var(--accent);padding:1px 4px;border-radius:3px}
.setup-err{background:var(--red-bg);border:1px solid rgba(220,38,38,0.2);border-radius:var(--radius);padding:9px 11px;font-size:12px;color:var(--red);margin-bottom:12px}
.setup-step{display:flex;gap:9px;margin-bottom:7px;font-size:12px;color:var(--text-2)}
.setup-step-n{width:17px;height:17px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.divider{height:1px;background:var(--border);margin:18px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spin-sm{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);font-weight:600;margin-bottom:9px}
.kbd{font-family:var(--mono);font-size:10px;background:var(--bg-hover);color:var(--text-3);padding:2px 5px;border-radius:4px;border:1px solid var(--border-md)}
/* theme toggle */
.theme-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:14px}
.theme-btn:hover{background:var(--bg-hover);color:var(--text)}
</style>
</head>

};

function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  return <div className="toast"><Ico d={ic.check} s={13}/>{msg}</div>;
}

          <div className="help-row"><span>🏷️</span><span>Поле «Фича» в редактировании — выберите из списка или введите новую</span></div>

        <div className="help-sec">
          <h3>Навигация</h3>
          <div className="help-row"><span>🔁</span><span>Кнопка «Обновить» — загружает свежие данные от коллег</span></div>
          <div className="help-row"><span>📊</span><span>«Все задачи» — сгруппированы по фиче, есть фильтры и поиск</span></div>
          <div className="help-row"><span>📤</span><span>«Экспорт» — скопировать протокол для Slack или письма</span></div>

          <div className="help-row"><span>🔵 Задача создана</span><span style={{marginLeft:6}}>— автоматически при добавлении ссылки</span></div>
          <div className="help-row"><span>🟣 В работе</span><span style={{marginLeft:6}}>— разработка идёт</span></div>
          <div className="help-row"><span>🟢 Готово</span><span style={{marginLeft:6}}>— выполнено</span></div>
          <div className="help-row"><span>🔴 Отклонено</span><span style={{marginLeft:6}}>— решили не делать</span></div>

function SetupScreen({onConnect}) {
  const [url,setUrl]=useState('');
  const [key,setKey]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  async function connect() {
    if(!url.trim()||!key.trim()){setErr('Заполните оба поля');return;}
    setBusy(true);setErr('');
    try {
      const c=createClient(url.trim(),key.trim());
      const {error}=await c.from('demo_items').select('id').limit(1);
      if(error&&error.code!=='PGRST116') throw error;
      localStorage.setItem(SK,JSON.stringify({url:url.trim(),key:key.trim()}));
      onConnect(c);
    } catch(e){setErr('Ошибка: '+(e.message||'проверьте URL и ключ'));setBusy(false);}
  }
  return (
    <div className="setup">
      <div className="setup-card">
        <div className="setup-logo">Демо<span>протокол</span></div>
        <div className="setup-sub">Подключите Supabase — бесплатную облачную базу данных.</div>
        {err&&<div className="setup-err">{err}</div>}
        <div className="setup-field"><label>Project URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/>
        </div>
        <div className="setup-field"><label>Anon Public Key</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGc..." type="password"/>
        </div>
        <button className="btn btn-accent" style={{width:'100%',height:38,marginTop:4,fontSize:14}} onClick={connect} disabled={busy}>
          {busy?<><span className="spin-sm"/> Подключение...</>:'Подключить'}
        </button>
        <div className="divider"/>
        <div className="setup-hint">
          {[['1','Зарегистрируйтесь на ',<a href="https://supabase.com" target="_blank">supabase.com</a>],
            ['2','Создайте проект'],
            ['3','Settings → API Keys → Legacy'],
            ['4','Скопируйте ',<code>Project URL</code>,' и ',<code>anon public</code>],
            ['5','В ',<code>SQL Editor</code>,' выполните запрос из инструкции'],
          ].map(([n,...r])=>(
            <div key={n} className="setup-step"><span className="setup-step-n">{n}</span><span>{r}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [sb,setSb]=useState(null);
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('live');
  const [toast,setToast]=useState('');
  const [showHelp,setShowHelp]=useState(false);
  const [dark,setDark]=useState(()=>localStorage.getItem(TK)==='dark');
  const [expandedId,setExpandedId]=useState(null);
  const [confirmId,setConfirmId]=useState(null);

  const [fStatus,setFStatus]=useState('');
  const [fRelease,setFRelease]=useState('');
  const [fSearch,setFSearch]=useState('');
  const [fFeature,setFFeature]=useState('');

  const [demoName,setDemoName]=useState('');
  const [demoDate,setDemoDate]=useState(new Date().toISOString().slice(0,10));
  const [demoAuthor,setDemoAuthor]=useState('');

  const [fDesc,setFDesc]=useState('');
  const [fAuthor,setFAuthor]=useState('');
  const [fPriority,setFPriority]=useState('medium');
  const [fLink,setFLink]=useState('');
  const [fRel,setFRel]=useState('');
  const [fComment,setFComment]=useState('');

  // тема
  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
    localStorage.setItem(TK,dark?'dark':'light');
  },[dark]);

  // инициализация
  useEffect(()=>{
    if(SUPABASE_URL&&SUPABASE_URL!=='ВСТАВЬТЕ_URL_СЮДА'){setSb(createClient(SUPABASE_URL,SUPABASE_KEY));return;}
    try{const s=localStorage.getItem(SK);if(s){const{url,key}=JSON.parse(s);setSb(createClient(url,key));return;}}catch{}
    setLoading(false);
  },[]);

  const loadItems=useCallback(async(client)=>{
    const{data,error}=await(client||sb).from('demo_items').select('*').order('id',{ascending:true});
    if(!error&&data)setItems(data);
    setLoading(false);
  },[sb]);

  useEffect(()=>{if(sb)loadItems(sb);},[sb]);

  async function addItem(){
    if(!fDesc.trim())return;
    const link=fLink.trim();
    const status=link?'created':'pending';
    const row={
      demo_name:demoName,demo_date:demoDate,demo_author:demoAuthor,
      description:fDesc.trim(),author:fAuthor.trim()||'Не указан',
      priority:fPriority,status,
      link,release:fRel.trim(),
      comment:fComment.trim(),
    };
    const{data,error}=await sb.from('demo_items').insert([row]).select();
    if(!error&&data){
      setItems(prev=>[...prev,data[0]]);
      setFDesc('');setFLink('');setFRel('');setFComment('');
      setToast('Пожелание зафиксировано');
    }
  }

  async function updateItem(id,patch){
    // автостатус при изменении ссылки
    if('link' in patch){
      const item=items.find(i=>i.id===id);
      if(item){
        const newStatus=autoStatus(item.status,patch.link);
        if(newStatus!==item.status) patch.status=newStatus;
      }
    }
    await sb.from('demo_items').update(patch).eq('id',id);
    setItems(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  }

  async function deleteItem(id){
    await sb.from('demo_items').delete().eq('id',id);
    setItems(prev=>prev.filter(i=>i.id!==id));
    setExpandedId(null);setConfirmId(null);
    setToast('Доработка удалена');
  }

  async function refresh(){setLoading(true);await loadItems(sb);setToast('Данные обновлены');}
  function disconnect(){localStorage.removeItem(SK);window.location.reload();}

  if(!sb&&!loading)return <SetupScreen onConnect={c=>{setSb(c);setLoading(true);}}/>;

  const counts={all:items.length,pending:0,created:0,inprogress:0,done:0,declined:0};
  items.forEach(i=>{if(counts[i.status]!==undefined)counts[i.status]++;});
  const releases=[...new Set(items.map(i=>i.release).filter(Boolean))];
  const features=[...new Set(items.map(i=>i.demo_name).filter(Boolean))];

  const visible=items.filter(i=>{
    if(fFeature&&i.demo_name!==fFeature)return false;
    if(fStatus&&i.status!==fStatus)return false;
    if(fRelease&&i.release!==fRelease)return false;
    if(fSearch&&!i.description.toLowerCase().includes(fSearch.toLowerCase())
      &&!(i.comment||'').toLowerCase().includes(fSearch.toLowerCase())
      &&!i.author.toLowerCase().includes(fSearch.toLowerCase()))return false;
    return true;
  });

  // группировка по фиче для board
  const grouped=()=>{
    const map={};
    visible.forEach(i=>{
      const k=i.demo_name||'Без фичи';
      if(!map[k])map[k]=[];
      map[k].push(i);
    });
    return Object.entries(map);
  };

  function buildExport(){
    const line='─'.repeat(44);
    let t=`ПРОТОКОЛ ДЕМО\n${line}\n`;
    t+=`Фича:    ${demoName||'—'}\nДата:    ${demoDate||'—'}\nВедущий: ${demoAuthor||'—'}\n${line}\n\n`;
    const groups={};
    Object.keys(SM).forEach(k=>groups[k]=[]);
    items.forEach(i=>groups[i.status]?.push(i));
    ['inprogress','created','pending','done','declined'].forEach(s=>{
      if(!groups[s].length)return;
      t+=`${SM[s].label.toUpperCase()} (${groups[s].length})\n`;
      groups[s].forEach(i=>{
        t+=`  #${i.id} [${PM[i.priority]?.label||i.priority}] ${i.description}\n`;
        t+=`       Фича: ${i.demo_name||'—'}  |  Автор: ${i.author}`;
        if(i.release)t+=`  |  Релиз: ${i.release}`;
        if(i.link)t+=`  |  Задача: ${i.link}`;
        t+='\n';
        if(i.comment)t+=`       Комментарий: ${i.comment}\n`;
      });
      t+='\n';
    });
    t+=`${line}\nСформировано: ${new Date().toLocaleString('ru-RU')}`;
    return t;
  }

  async function copyExport(){await navigator.clipboard.writeText(buildExport());setToast('Протокол скопирован');}

  function ItemCard({item}){
    const exp=expandedId===item.id;
    const conf=confirmId===item.id;
    const sm=SM[item.status]||SM.pending;
    const pm=PM[item.priority]||PM.medium;
    const allFeat=[...new Set(items.map(i=>i.demo_name).filter(Boolean))];
    return(
      <div className={`item-card s-${item.status}`}>
        <div className="item-top">
          <span className="item-num">#{item.id}</span>
          <div className="item-body">
            <div className="item-desc">{item.description}</div>
            {item.comment&&<div className="item-comment"><Ico d={ic.comment} s={11} style={{marginRight:5,opacity:.5}}/>{item.comment}</div>}
            <div className="pills">
              <span className={`pill ${sm.p}`}>{sm.label}</span>
              <span className={`pill ${pm.p}`} style={{opacity:.85}}>{pm.label}</span>
              {item.demo_name&&<span className="pill p-sky">{item.demo_name}</span>}
              {item.release&&<span className="pill p-purple" style={{display:'flex',alignItems:'center',gap:3}}><Ico d={ic.branch} s={10}/>{item.release}</span>}
            </div>
            <div className="item-meta">
              <span className="mchip"><Ico d={ic.user} s={12}/>{item.author}</span>
              {item.created_at&&<span className="mchip"><Ico d={ic.clock} s={12}/>{new Date(item.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</span>}
              {item.link&&<a className="ilink" href={item.link.startsWith('http')?item.link:'#'} target="_blank" rel="noreferrer">
                <span style={{display:'flex',alignItems:'center',gap:3}}><Ico d={ic.link2} s={11}/>{item.link.replace(/^https?:\/\//,'').slice(0,34)}</span>
              </a>}
            </div>
            {exp&&(
              <div className="edit-panel">
                <div className="edit-row edit-row-3" style={{marginBottom:8}}>
                  <div className="fg"><label>Статус</label>
                    <select value={item.status} onChange={e=>updateItem(item.id,{status:e.target.value})}>
                      {Object.entries(SM).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="fg"><label>Релиз</label>
                    <input defaultValue={item.release} placeholder="2.4.1" onBlur={e=>updateItem(item.id,{release:e.target.value})}/>
                  </div>
                  <div className="fg"><label>Ссылка на задачу (→ авто-статус)</label>
                    <input defaultValue={item.link} placeholder="PROJ-123 или https://..."
                      onBlur={e=>updateItem(item.id,{link:e.target.value})}/>
                  </div>
                </div>
                <div style={{marginBottom:8}}>
                  <div className="fg"><label>Комментарий</label>
                    <textarea defaultValue={item.comment||''} placeholder="Доп. заметки, вопросы, обсуждение..."
                      style={{minHeight:56}}
                      onBlur={e=>updateItem(item.id,{comment:e.target.value})}/>
                  </div>
                </div>
                <div className="edit-row edit-row-2">
                  <div className="fg">
                    <label>Фича / демо</label>
                    <input list={`feat-${item.id}`} defaultValue={item.demo_name}
                      placeholder="Выберите или введите новую"
                      onBlur={e=>updateItem(item.id,{demo_name:e.target.value})}/>
                    <datalist id={`feat-${item.id}`}>
                      {allFeat.map(f=><option key={f} value={f}/>)}
                    </datalist>
                  </div>
                  <button className="btn btn-danger btn-sm" style={{height:34,alignSelf:'flex-end'}}
                    onClick={()=>setConfirmId(conf?null:item.id)}>
                    <Ico d={ic.trash} s={13}/>Удалить
                  </button>
                </div>
                {conf&&(
                  <div className="confirm-box">
                    <span>Удалить доработку #{item.id}? Это действие нельзя отменить.</span>
                    <div className="confirm-btns">
                      <button className="btn btn-ghost btn-sm" onClick={()=>setConfirmId(null)}>Отмена</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>deleteItem(item.id)}>Да, удалить</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
          <div className="item-actions">
            <button className="btn btn-ghost btn-sm btn-icon"
              onClick={()=>{setExpandedId(exp?null:item.id);setConfirmId(null);}} title="Редактировать">
              <Ico d={ic.edit} s={13}/>
            </button>
          </div>
        </div>
      </div>
    );
  }

  const navItems=[
    {id:'live', label:'Режим демо', dot:'#6366f1',count:counts.all},
    {id:'board',label:'Все задачи',dot:'#5a5a68',count:counts.all},
    {id:'export',label:'Экспорт',  dot:'#16a34a',count:null},
  ];

  return(
    <div className="app">
      {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
      <header className="topbar">
        <div className="topbar-left">
          <span className="logo">Демо<span>протокол</span></span>
          <span className="meta-sep">|</span>
          <div className="demo-meta">
            <input className="meta-input" value={demoName} onChange={e=>setDemoName(e.target.value)} placeholder="Название фичи" style={{minWidth:130}}/>
            <span className="meta-sep">·</span>
            <input className="meta-input" type="date" value={demoDate} onChange={e=>setDemoDate(e.target.value)} style={{width:126}}/>
            <span className="meta-sep">·</span>
            <input className="meta-input" value={demoAuthor} onChange={e=>setDemoAuthor(e.target.value)} placeholder="PM / ведущий" style={{minWidth:90}}/>
          </div>
        </div>
        <div className="topbar-right">
          <button className="theme-btn" onClick={()=>setDark(d=>!d)} title={dark?'Светлая тема':'Тёмная тема'}>
            {dark?'☀️':'🌙'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowHelp(true)}>
            <Ico d={ic.help} s={13}/>Как пользоваться
          </button>
          <button className="btn btn-ghost btn-sm" onClick={refresh}><Ico d={ic.refresh} s={13}/>Обновить</button>
          {!(SUPABASE_URL&&SUPABASE_URL!=='ВСТАВЬТЕ_URL_СЮДА')&&
            <button className="btn btn-ghost btn-sm btn-icon" onClick={disconnect} title="Сменить подключение"><Ico d={ic.cog} s={13}/></button>}
        </div>
      </header>

      <div className="body">
        <aside className="sidebar">
          <div className="sidebar-section">Разделы</div>
          {navItems.map(n=>(
            <button key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="nav-item-left"><span className="nav-dot" style={{background:n.dot}}/><span>{n.label}</span></span>
              {n.count!==null&&<span className="cnt">{n.count}</span>}
            </button>
          ))}
          <div className="sidebar-section" style={{marginTop:6}}>По статусу</div>
          {Object.entries(SM).map(([k,v])=>(
            <button key={k} className={`nav-item ${fStatus===k&&view==='board'?'active':''}`}
              onClick={()=>{setFStatus(k);setView('board');}}>
              <span className="nav-item-left"><span className="nav-dot" style={{background:v.dot}}/><span>{v.label}</span></span>
              <span className="cnt">{counts[k]}</span>
            </button>
          ))}
          {features.length>0&&<>
            <div className="sidebar-section" style={{marginTop:6}}>По фиче</div>
            {features.map(f=>(
              <button key={f} className={`nav-item ${fFeature===f&&view==='board'?'active':''}`}
                onClick={()=>{setFFeature(f);setView('board');}}>
                <span className="nav-item-left"><span className="nav-dot" style={{background:'var(--sky)'}}/><span>{f}</span></span>
                <span className="cnt">{items.filter(i=>i.demo_name===f).length}</span>
              </button>
            ))}
          </>}
          {releases.length>0&&<>
            <div className="sidebar-section" style={{marginTop:6}}>По релизу</div>
            {releases.map(r=>(
              <button key={r} className={`nav-item ${fRelease===r&&view==='board'?'active':''}`}
                onClick={()=>{setFRelease(r);setView('board');}}>
                <span className="nav-item-left"><span className="nav-dot" style={{background:'var(--purple)'}}/><span>{r}</span></span>
                <span className="cnt">{items.filter(i=>i.release===r).length}</span>
              </button>
            ))}
          </>}
        </aside>

        <main className="main">
          {loading?(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,gap:10,color:'var(--text-3)',fontSize:13}}>
              <div className="spinner"/>Загрузка...
            </div>
          ):(
            <>
              {view==='live'&&(
                <>
                  <div className="stats-grid">
                    <div className="stat-card"><div className="stat-val">{counts.all}</div><div className="stat-lbl">Всего</div></div>
                    <div className="stat-card"><div className="stat-val" style={{color:'var(--amber)'}}>{counts.pending}</div><div className="stat-lbl">Ожидают</div></div>
                    <div className="stat-card"><div className="stat-val" style={{color:'var(--accent)'}}>{counts.created+counts.inprogress}</div><div className="stat-lbl">В работе</div></div>
                    <div className="stat-card"><div className="stat-val" style={{color:'var(--green)'}}>{counts.done}</div><div className="stat-lbl">Готово</div></div>
                    <div className="stat-card"><div className="stat-val" style={{color:'var(--red)'}}>{counts.declined}</div><div className="stat-lbl">Отклонено</div></div>
                  </div>

                  <div className="add-form">
                    <div className="form-title"><Ico d={ic.plus} s={14}/>Зафиксировать пожелание</div>
                    <div className="g3" style={{marginBottom:10}}>
                      <div className="fg"><label>Описание пожелания</label>
                        <textarea value={fDesc} onChange={e=>setFDesc(e.target.value)}
                          placeholder="Что хочет участник... (Shift+Enter для переноса строки)"
                          onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))addItem();}}/>
                      </div>
                      <div className="fg"><label>Автор</label>
                        <input value={fAuthor} onChange={e=>setFAuthor(e.target.value)} placeholder="Имя участника"/>
                      </div>
                      <div className="fg"><label>Приоритет</label>
                        <select value={fPriority} onChange={e=>setFPriority(e.target.value)}>
                          <option value="blocking">Блокирующий</option>
                          <option value="critical">Критический</option>
                          <option value="medium">Средний</option>
                          <option value="low">Низкий</option>
                        </select>
                      </div>
                    </div>
                    <div className="fg" style={{marginBottom:10}}>
                      <label>Комментарий (необязательно)</label>
                      <textarea value={fComment} onChange={e=>setFComment(e.target.value)}
                        placeholder="Доп. заметки, вопросы стейкхолдеров... (Shift+Enter для переноса строки)"
                        style={{minHeight:52}}/>
                    </div>
                    <div className="g2" style={{marginBottom:10}}>
                      <div className="fg"><label>Ссылка на задачу (→ авто-статус «Задача создана»)</label>
                        <input value={fLink} onChange={e=>setFLink(e.target.value)} placeholder="PROJ-123 или https://jira..."/>
                      </div>
                      <div className="fg"><label>Релиз (необязательно)</label>
                        <input value={fRel} onChange={e=>setFRel(e.target.value)} placeholder="2.4.1"/>
                      </div>
                    </div>
                    <div className="form-actions">
                      <span style={{fontSize:11,color:'var(--text-3)'}}><kbd className="kbd">Ctrl+Enter</kbd></span>
                      <button className="btn btn-accent" onClick={addItem}><Ico d={ic.plus} s={13}/>Зафиксировать</button>
                    </div>
                  </div>

                  <div className="sec-label">Зафиксировано на демо</div>
                  <div className="items-list">
                    {items.length===0
                      ?<div className="empty"><div className="empty-icon">📋</div><div className="empty-title">Пожеланий пока нет</div><div style={{fontSize:13,color:'var(--text-3)'}}>Добавьте первое выше</div></div>
                      :[...items].reverse().map(i=><ItemCard key={i.id} item={i}/>)
                    }
                  </div>
                </>
              )}

              {view==='board'&&(
                <>
                  <div className="filter-bar">
                    <input value={fSearch} onChange={e=>setFSearch(e.target.value)} placeholder="Поиск..." style={{width:180}}/>
                    <select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
                      <option value="">Все статусы</option>
                      {Object.entries(SM).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                    <select value={fFeature} onChange={e=>setFFeature(e.target.value)}>
                      <option value="">Все фичи</option>
                      {features.map(f=><option key={f} value={f}>{f}</option>)}
                    </select>
                    <select value={fRelease} onChange={e=>setFRelease(e.target.value)}>
                      <option value="">Все релизы</option>
                      {releases.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                    {(fStatus||fRelease||fSearch||fFeature)&&
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setFStatus('');setFRelease('');setFSearch('');setFFeature('');}}>Сбросить</button>}
                  </div>
                  {visible.length===0
                    ?<div className="empty"><div className="empty-icon">🔍</div><div className="empty-title">Ничего не найдено</div></div>
                    :grouped().map(([feat,fitems])=>(
                      <div key={feat} className="feat-group">
                        <div className="feat-group-hdr">
                          <span className="feat-group-title">{feat}</span>
                          <span className="feat-group-cnt">{fitems.length}</span>
                        </div>
                        <div className="items-list">
                          {fitems.map(i=><ItemCard key={i.id} item={i}/>)}
                        </div>
                      </div>
                    ))
                  }
                </>
              )}

              {view==='export'&&(
                <>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginBottom:14}}>
                    <button className="btn btn-accent" onClick={copyExport}><Ico d={ic.copy} s={13}/>Скопировать протокол</button>
                  </div>
                  <div className="export-box">
                    <div className="export-bar">
                      <span className="export-bar-title">protocol.txt</span>
                      <span style={{fontSize:11,color:'var(--text-3)'}}>{items.length} задач</span>
                    </div>
                    <pre className="export-pre">{buildExport()}</pre>
                  </div>
                </>
              )}
            </>
          )}
        </main>
      </div>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
